name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Serialization tests (serde feature)
        run: cargo test -p ledge-core --features serde
      - name: Batch tests (rayon feature)
        run: cargo test -p ledge-core --features rayon --test batch
      - name: Benches compile
        run: cargo bench -p ledge-core --features bench-internals --no-run
      - name: Release smoke example
        run: cargo run -p ledge-portfolio --release --example rebalance
      - name: Rolling sequence example
        run: cargo run -p ledge-portfolio --release --example sequence
      - name: Batch example (rayon, reduced size)
        run: >-
          cargo run -p ledge-portfolio --release --features rayon --example batch --
          --accounts 24 --dates 12 --n 60 --k 6

  # Independent of the rust job so adapter breakages stay visible when
  # fmt/clippy fail first (they previously skipped this step on the same job).
  adapters:
    name: Comparison adapters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Separate key prefix so this job does not thrash the default-feature
          # rust-job cache with OSQP/Clarabel native build artifacts.
          prefix-key: adapters-v1
      - name: Adapter tests (OSQP + Clarabel)
        run: cargo test -p ledge-bench-adapters --features osqp,clarabel

  # Builds the mdBook docs site and uploads it as an artifact. Public Pages
  # deployment remains an explicit action in docs-deploy.yml.
  docs:
    name: Docs site (build only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          archive="$RUNNER_TEMP/mdbook-v0.4.52-x86_64-unknown-linux-gnu.tar.gz"
          curl --fail --silent --show-error --location --output "$archive" \
            https://github.com/rust-lang/mdBook/releases/download/v0.4.52/mdbook-v0.4.52-x86_64-unknown-linux-gnu.tar.gz
          echo "c0b903f01dd8f4edc644372ad2b80b1fdddd12552d37b6a098657cbd8eddd768  $archive" \
            | sha256sum --check
          tar xzf "$archive" -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build book
        run: |
          ./scripts/check_open_core.sh
          python scripts/generate_demo_assets.py --check
          mdbook build docs/book
      - name: Upload site artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docs-site
          path: docs/book/book
          retention-days: 14

  python:
    name: Python binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install package
        run: |
          python -m pip install --upgrade pip maturin
          python -m pip install -e "python/[test]"
      - name: API and gold-standard tests
        run: python -m pytest python/tests -q
      - name: Examples
        run: |
          python python/examples/rebalance.py
          python python/examples/rolling.py
