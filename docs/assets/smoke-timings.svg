<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-label="Ledge synthetic smoke timings">
  <rect width="920" height="420" rx="16" fill="#f7fafc" stroke="#cbd5e0"/>
  <text x="32" y="40" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#1a202c">Synthetic smoke timings (self-test)</text>
  <text x="32" y="68" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#4a5568">4-vCPU Xeon cloud VM · rustc 1.83 · cargo --release · automatic scaling + over-relaxation on · not a cross-solver benchmark</text>

  <!-- axis -->
  <line x1="120" y1="340" x2="860" y2="340" stroke="#a0aec0" stroke-width="2"/>
  <line x1="120" y1="100" x2="120" y2="340" stroke="#a0aec0" stroke-width="2"/>
  <text x="40" y="230" transform="rotate(-90 40,230)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#4a5568">wall time (ms, log-ish)</text>

  <!-- bars: times 0.2, 2.8, 15, 90, 1100 ms on a soft log scale -->
  <rect x="150" y="310" width="90" height="30" rx="6" fill="#3182ce"/>
  <text x="195" y="300" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#2d3748">~0.2 ms</text>
  <text x="195" y="365" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#2d3748">n=100</text>
  <text x="195" y="383" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#718096">Solved</text>

  <rect x="285" y="250" width="90" height="90" rx="6" fill="#3182ce"/>
  <text x="330" y="240" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#2d3748">~2.8 ms</text>
  <text x="330" y="365" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#2d3748">n=500</text>
  <text x="330" y="383" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#718096">Solved</text>

  <rect x="420" y="212" width="90" height="128" rx="6" fill="#3182ce"/>
  <text x="465" y="202" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#2d3748">~15 ms</text>
  <text x="465" y="365" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#2d3748">n=1000</text>
  <text x="465" y="383" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#718096">Solved</text>

  <rect x="555" y="172" width="90" height="168" rx="6" fill="#3182ce"/>
  <text x="600" y="162" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#2d3748">~90 ms</text>
  <text x="600" y="365" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#2d3748">n=2000</text>
  <text x="600" y="383" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#718096">Solved</text>

  <rect x="690" y="116" width="90" height="224" rx="6" fill="#3182ce"/>
  <text x="735" y="106" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#2d3748">~1100 ms</text>
  <text x="735" y="365" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#2d3748">n=5000</text>
  <text x="735" y="383" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#718096">Solved</text>

  <rect x="800" y="300" width="18" height="18" rx="3" fill="#3182ce"/>
  <text x="828" y="314" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#2d3748">converged</text>
</svg>
